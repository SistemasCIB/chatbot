<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if cita %}Editar cita{% else %}Nueva cita{% endif %}</title>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f8;
            margin: 0;
            padding: 30px 20px;
        }

        .container {
            max-width: 920px;
            margin: auto;
            background: white;
            padding: 36px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            margin: 0 0 28px;
            font-size: 22px;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }

        /* ========================= */
        /* SECCIONES */
        /* ========================= */

        .seccion {
            margin-bottom: 28px;
        }

        .seccion-titulo {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 14px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* ========================= */
        /* GRID */
        /* ========================= */

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo-full {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        input,
        select,
        textarea {
            padding: 10px 13px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        textarea {
            resize: vertical;
        }

        .hidden {
            display: none;
        }

        /* ========================= */
        /* ACCIONES */
        /* ========================= */

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .btn-save {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-save:hover { background: #1d4ed8; }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background: #e2e8f0; }

        /* archivo actual */
        .archivo-actual {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
        }

        .archivo-actual a {
            color: #2563eb;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .campo-full { grid-column: 1; }
            body { padding: 16px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>
        {% if cita %}Editar cita{% else %}Nueva cita{% endif %}
    </h1>

    <form method="POST" enctype="multipart/form-data">

        <!-- ========================= -->
        <!-- DATOS PACIENTE -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Datos del paciente</div>
            <div class="grid">

                <div class="campo">
                    <label>Tipo documento</label>
                    <select name="tipo_documento" required>
                        <option value="CC" {% if cita and cita.paciente.tipo_documento == 'CC' %}selected{% endif %}>CC</option>
                        <option value="TI" {% if cita and cita.paciente.tipo_documento == 'TI' %}selected{% endif %}>TI</option>
                        <option value="CE" {% if cita and cita.paciente.tipo_documento == 'CE' %}selected{% endif %}>CE</option>
                        <option value="PP" {% if cita and cita.paciente.tipo_documento == 'PP' %}selected{% endif %}>Pasaporte</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Documento</label>
                    <input type="text" name="documento" id="documento"
                        value="{{ cita.paciente.documento if cita else '' }}" required>
                </div>

                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" name="nombre" id="nombre"
                        value="{{ cita.paciente.nombre if cita else '' }}" required>
                </div>

                <div class="campo">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" id="telefono"
                        value="{{ cita.paciente.telefono if cita else '' }}" required>
                </div>
                <div class="campo">
                    <label>Fecha de nacimiento</label>
                    <input 
                        type="date" 
                        name="fecha_nacimiento"
                        value="{% if cita and cita.paciente.fecha_nacimiento %}{{ cita.paciente.fecha_nacimiento.strftime('%Y-%m-%d') }}{% endif %}"
                    >
                </div>
                <div class="campo campo-full">
                    <label>Correo</label>
                    <input type="email" name="correo"
                        value="{{ cita.paciente.correo if cita else '' }}">
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- TIPO CITA Y AGENDA -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Tipo de cita</div>
            <div class="grid">

                <div class="campo">
                    <label>Tipo de cita</label>
                    <select name="tipo_cita" id="tipo_cita" required>
                        <option value="">Selecciona</option>
                        <option value="presencial" {% if cita and cita.tipo_cita == 'presencial' %}selected{% endif %}>Presencial</option>
                        <option value="domicilio"  {% if cita and cita.tipo_cita == 'domicilio'  %}selected{% endif %}>Domicilio</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Agenda</label>
                    <select name="agenda_tipo" id="agenda_tipo">
                        <option value="">Selecciona agenda</option>
                        <option value="micologia"     {% if cita and cita.agenda_tipo == 'micologia'     %}selected{% endif %}>Micología</option>
                        <option value="bacteriologia" {% if cita and cita.agenda_tipo == 'bacteriologia' %}selected{% endif %}>Bacteriología</option>
                        <option value="domicilio"     {% if cita and cita.agenda_tipo == 'domicilio'     %}selected{% endif %}>Domicilio</option>
                    </select>
                </div>

                <div class="campo campo-full hidden" id="direccion_box">
                    <label>Dirección domicilio</label>
                    <textarea name="direccion_domicilio" rows="3">{{ cita.direccion_domicilio if cita else '' }}</textarea>
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- COBERTURA -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Cobertura</div>
            <div class="grid">

                <div class="campo">
                    <label>Cobertura</label>
                    <select name="cobertura">
                        <option value="Particular" {% if cita and cita.cobertura == 'Particular' %}selected{% endif %}>Particular</option>
                        <option value="Poliza"     {% if cita and cita.cobertura == 'Poliza'     %}selected{% endif %}>Póliza</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Póliza / Aseguradora</label>
                    <select name="aseguradora">
                        <option value="">N/A</option>
                        <option value="Poliza Sura"     {% if cita and cita.aseguradora == 'Poliza Sura'     %}selected{% endif %}>Póliza Sura</option>
                        <option value="Coomeva"         {% if cita and cita.aseguradora == 'Coomeva'         %}selected{% endif %}>Coomeva</option>
                        <option value="Medplus"         {% if cita and cita.aseguradora == 'Medplus'         %}selected{% endif %}>Medplus</option>
                        <option value="Seguros Bolivar" {% if cita and cita.aseguradora == 'Seguros Bolivar' %}selected{% endif %}>Seguros Bolívar</option>
                    </select>
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- EXAMEN -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Examen</div>
            <div class="grid">

                <div class="campo">
                    <label>Tipo de examen</label>
                    <select name="tipo_examen">
                        <option value="">Seleccionar</option>
                        <option value="Directo hongos"    {% if cita and cita.tipo_examen == 'Directo hongos'    %}selected{% endif %}>Directo hongos</option>
                        <option value="Hongos + Cultivo"  {% if cita and cita.tipo_examen == 'Hongos + Cultivo'  %}selected{% endif %}>Hongos + Cultivo</option>
                        <option value="Galactomanan"      {% if cita and cita.tipo_examen == 'Galactomanan'      %}selected{% endif %}>Galactomanan</option>
                        <option value="Cryptococcus"      {% if cita and cita.tipo_examen == 'Cryptococcus'      %}selected{% endif %}>Cryptococcus</option>
                        <option value="Serologia hongos"  {% if cita and cita.tipo_examen == 'Serologia hongos'  %}selected{% endif %}>Serología hongos</option>
                        <option value="Serologia endemicos" {% if cita and cita.tipo_examen == 'Serologia endemicos' %}selected{% endif %}>Serología endémicos</option>
                        <option value="Serologia completa" {% if cita and cita.tipo_examen == 'Serologia completa' %}selected{% endif %}>Serología completa</option>
                        <option value="IGRAs"             {% if cita and cita.tipo_examen == 'IGRAs'             %}selected{% endif %}>IGRAs</option>
                        <option value="Tuberculina PPD"   {% if cita and cita.tipo_examen == 'Tuberculina PPD'   %}selected{% endif %}>Tuberculina PPD</option>
                        <option value="Otro examen"       {% if cita and cita.tipo_examen == 'Otro examen'       %}selected{% endif %}>Otro examen</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Tipo de muestra</label>
                    <select name="tipo_muestra">
                        <option value="">Seleccionar</option>
                        <option value="Uñas"            {% if cita and cita.tipo_muestra == 'Uñas'            %}selected{% endif %}>Uñas</option>
                        <option value="Piel"            {% if cita and cita.tipo_muestra == 'Piel'            %}selected{% endif %}>Piel</option>
                        <option value="Cuero cabelludo" {% if cita and cita.tipo_muestra == 'Cuero cabelludo' %}selected{% endif %}>Cuero cabelludo</option>
                        <option value="Flujo vaginal"   {% if cita and cita.tipo_muestra == 'Flujo vaginal'   %}selected{% endif %}>Flujo vaginal</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Área</label>
                    <select name="area">
                        <option value="">Selecciona</option>
                        <option value="Micología"    {% if cita and cita.area == 'Micología'    %}selected{% endif %}>Micología</option>
                        <option value="Bacteriología" {% if cita and cita.area == 'Bacteriología' %}selected{% endif %}>Bacteriología</option>
                    </select>
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- FECHA, HORA Y ESTADO -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Programación</div>
            <div class="grid">

                <div class="campo">
                    <label>Fecha cita</label>
                    <input type="date" name="fecha_cita" id="fecha_cita" required
                        value="{{ cita.fecha_cita.strftime('%Y-%m-%d') if cita and cita.fecha_cita else '' }}">
                </div>

                <div class="campo">
                    <label>Hora cita</label>
                    <input type="time" name="hora_cita" id="hora_cita"
                        value="{{ cita.hora_cita if cita else '' }}">
                </div>

                <div class="campo">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="pendiente"  {% if cita and cita.estado == 'pendiente'  %}selected{% endif %}>Pendiente</option>
                        <option value="confirmada" {% if cita and cita.estado == 'confirmada' %}selected{% endif %}>Confirmada</option>
                        <option value="rechazada"  {% if cita and cita.estado == 'rechazada'  %}selected{% endif %}>Rechazada</option>
                        <option value="cancelada"  {% if cita and cita.estado == 'cancelada'  %}selected{% endif %}>Cancelada</option>
                    </select>
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- ORDEN MÉDICA -->
        <!-- ========================= -->

        <div class="seccion">
            <div class="seccion-titulo">Orden médica</div>
            <div class="grid">

                <div class="campo campo-full">
                    <label>Adjuntar orden médica</label>
                    <input type="file" name="orden_medica" accept=".pdf,image/*">
                    {% if cita and cita.orden_medica %}
                        <span class="archivo-actual">
                            Archivo actual:
                            <a href="{{ url_for('static', filename='uploads/' + cita.orden_medica) }}" target="_blank">
                                {{ cita.orden_medica }}
                            </a>
                        </span>
                    {% endif %}
                </div>

            </div>
        </div>

        <!-- ========================= -->
        <!-- ACCIONES -->
        <!-- ========================= -->

        <div class="actions">
            <button type="submit" class="btn-save">Guardar cambios</button>
            <a href="/asesor" class="btn-cancel">Cancelar</a>
        </div>

    </form>
</div>

<script>

// =====================================================
// MOSTRAR / OCULTAR DIRECCIÓN + AUTO AGENDA
// =====================================================

const tipoCita   = document.getElementById('tipo_cita');
const direccionBox = document.getElementById('direccion_box');
const agendaTipo = document.getElementById('agenda_tipo');

function actualizarFormulario() {
    if (tipoCita.value === 'domicilio') {
        direccionBox.classList.remove('hidden');
        agendaTipo.value = 'domicilio';
    } else {
        direccionBox.classList.add('hidden');
        if (agendaTipo.value === 'domicilio') {
            agendaTipo.value = '';
        }
    }
}

tipoCita.addEventListener('change', actualizarFormulario);
actualizarFormulario();

// =====================================================
// BUSCAR PACIENTE AUTOMÁTICO
// =====================================================

const documentoInput = document.getElementById('documento');

if (documentoInput) {
    documentoInput.addEventListener('blur', async () => {
        const documento = documentoInput.value.trim();
        if (!documento) return;
        try {
            const response = await fetch(`/asesor/buscar_paciente?documento=${documento}`);
            const data = await response.json();
            if (data.nombre) {
                document.getElementById('nombre').value   = data.nombre   || '';
                document.getElementById('telefono').value = data.telefono || '';
            }
        } catch (error) {
            console.log(error);
        }
    });
}
const params = new URLSearchParams(window.location.search);
if (params.get('fecha')) {
    document.getElementById('fecha_cita').value = params.get('fecha');
}
if (params.get('hora') && params.get('hora') !== '00:00') {
    document.getElementById('hora_cita').value = params.get('hora');
}

</script>

</body>
</html>
