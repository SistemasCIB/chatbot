<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIB - Login Asesor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            width: 160px;
            height: auto;
            margin-bottom: 12px;
        }
        .logo p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #1a1a2e; }
        button {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #2d2d4e; }
        .error {
            background: #fdecea;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img
                src="https://cib.org.co/wp-content/uploads/2021/09/logo-CIB-sin-fondo.webp"
                alt="CIB Logo"
            >
            <p>Panel de Asesores</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Ingresa tu usuario" required autofocus>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <div class="mb-3">
              <div class="g-recaptcha" data-sitekey="6LeFVwctAAAAAP0P9ObzjCIOgMwljAsnK4Icvxfw"></div>
            </div>  
            <button type="submit">Ingresar</button>
        </form>

        <hr class="divider">

    </div>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>    
</body>
</html>
