<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cambiar contraseña</title>

<style>

body{
    font-family:Arial;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:white;
    padding:35px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
    margin-bottom:25px;
    color:#223A7F;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:16px;
    border:1px solid #dfe3eb;
    border-radius:10px;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#223A7F;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#182B63;
}

a{
    display:block;
    margin-top:18px;
    text-align:center;
    color:#2EA1DB;
    text-decoration:none;
}

.flash{
    background:#fee2e2;
    color:#b91c1c;
    padding:12px;
    border-radius:10px;
    margin-bottom:16px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="card">

    <h2>🔒 Cambiar contraseña</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}

            {% for m in messages %}
                <div class="flash">
                    {{ m }}
                </div>
            {% endfor %}

        {% endif %}
    {% endwith %}

    <form method="POST"
          action="/asesor/guardar-password">

        <input
            type="password"
            name="actual"
            placeholder="Contraseña actual"
            required
        >

        <input
            type="password"
            name="nueva"
            placeholder="Nueva contraseña"
            required
        >

        <input
            type="password"
            name="confirmar"
            placeholder="Confirmar nueva contraseña"
            required
        >

        <button type="submit">
            Guardar contraseña
        </button>

    </form>

    <a href="/asesor">
        ← Volver al panel
    </a>

</div>

</body>
</html>
