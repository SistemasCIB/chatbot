<!-- templates/asesor_calendario.html -->

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda de Citas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- FULLCALENDAR -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet'>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f4f6f8;
    color:#1a1a2e;
}

/* HEADER */

header{
    background:#1a1a2e;
    color:white;
    padding:18px 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:20px;
    font-weight:600;
}

header span{
    font-size:13px;
    color:#b8bfd3;
}

.btn-volver{
    text-decoration:none;
    background:#34495e;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-size:14px;
    transition:0.2s;
}

.btn-volver:hover{
    background:#415b76;
}

/* CONTENT */

.container{
    padding:30px;
}

.card{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.04);
    border:1px solid #ececec;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top h2{
    font-size:24px;
    color:#1a1a2e;
}

.btn-new{
    background:#1a73e8;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    transition:0.2s;
}

.btn-new:hover{
    background:#1667cc;
}

/* CALENDAR */

#calendar{
    width:100%;
}

.fc{
    font-family:'Inter',sans-serif;
}

.fc-toolbar-title{
    font-size:22px !important;
    font-weight:600;
}

.fc-button{
    background:#1a73e8 !important;
    border:none !important;
    border-radius:8px !important;
    padding:8px 14px !important;
}

.fc-button:hover{
    background:#1667cc !important;
}

.fc-timegrid-slot{
    height:55px !important;
}

.fc-event{
    border:none !important;
    border-radius:8px !important;
    padding:3px 6px !important;
    font-size:13px;
    cursor:pointer;
}

.fc-col-header-cell{
    background:#1a1a2e;
    padding:10px 0 !important;
}

.fc-col-header-cell-cushion{
    color:white !important;
    text-decoration:none !important;
    font-weight:600;
}

.fc-timegrid-axis{
    font-size:13px;
}

.fc-day-today{
    background:rgba(26,115,232,0.05) !important;
}

/* RESPONSIVE */

@media(max-width:768px){

    .top{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    header{
        padding:18px 20px;
    }

    .container{
        padding:15px;
    }

}

</style>

</head>
<body>

<header>

    <div>
        <h1>CIB - Panel de Asesores</h1>
        <span>Agenda semanal de citas</span>
    </div>

    <a href="/asesor" class="btn-volver">
        ← Volver
    </a>

</header>

<div class="container">

    <div class="card">

        <div class="top">

            <h2>Agenda</h2>

            <a href="/asesor/nueva" class="btn-new">
                + Nueva cita
            </a>

        </div>

        <div id="calendar"></div>

    </div>

</div>

<script>

document.addEventListener('DOMContentLoaded', function () {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

        locale: 'es',

        initialView: 'timeGridWeek',

        slotDuration: '00:30:00',

        slotMinTime: '07:30:00',

        slotMaxTime: '16:00:00',

        allDaySlot: false,

        nowIndicator: true,

        selectable: true,

        editable: true,

        weekends: false,

        height: '85vh',

        expandRows: true,

        events: '/asesor/eventos',

        headerToolbar: {

            left: 'prev,next today',

            center: 'title',

            right: 'timeGridDay,timeGridWeek,dayGridMonth'

        },

        slotLabelFormat: {

            hour: '2-digit',
            minute: '2-digit',
            hour12: true

        },

        // CREAR CITA
        select: function(info){

            window.location.href =
            '/asesor/nueva?fecha=' +
            info.startStr;

        },

        // MOVER CITA
        eventDrop: function(info){

            fetch('/asesor/mover_cita', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    id: info.event.id,
                    fecha: info.event.start.toISOString()

                })

            })
            .then(response => response.json())
            .then(data => {

                if(!data.ok){

                    alert(data.mensaje);

                    info.revert();

                }

            });

        },

        // CLICK EN EVENTO
        eventClick: function(info){

            window.location.href =
            '/asesor/editar/' +
            info.event.id;

        },

        // TOOLTIP
        eventDidMount: function(info){

            info.el.title =
                info.event.title +
                ' | ' +
                info.event.start.toLocaleTimeString();

        }

    });

    calendar.render();

});

</script>

</body>
</html>
